name: Production Deployment

on:
  push:
    branches:
      - main
      - feat-telegram-auth

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Check if project directory exists, otherwise clone it
            if [ ! -d "/app/yacheyka" ]; then
              mkdir -p /app
              git clone https://github.com/${{ github.repository }}.git /app/yacheyka
              cd /app/yacheyka
              git checkout ${{ github.ref_name }}
            else
              cd /app/yacheyka
              git fetch --all
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            fi

            # Recreate production .env file from secrets
            cat > .env <<'EOF'
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_PORT=5432
            PORT=4002
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            MINIO_BUCKET=yacheyka-gallery
            AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}
            TELEGRAM_CLIENT_ID=${{ secrets.TELEGRAM_CLIENT_ID }}
            TELEGRAM_CLIENT_SECRET=${{ secrets.TELEGRAM_CLIENT_SECRET }}
            TELEGRAM_REDIRECT_URI=${{ secrets.TELEGRAM_REDIRECT_URI }}
            TELEGRAM_AUTH_MAX_AGE_SECONDS=86400
            AUTH_SESSION_TTL_SECONDS=604800
            ADMIN_OWNER_EMAIL=${{ secrets.ADMIN_OWNER_EMAIL }}
            ADMIN_OWNER_PASSWORD_HASH=${{ secrets.ADMIN_OWNER_PASSWORD_HASH }}
            ADMIN_SESSION_SECRET=${{ secrets.ADMIN_SESSION_SECRET }}
            ADMIN_SESSION_TTL_SECONDS=604800
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            MINIO_PUBLIC_URL=https://${{ secrets.DOMAIN_NAME }}
            EOF

            # Restart Docker Compose services in production mode
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build
