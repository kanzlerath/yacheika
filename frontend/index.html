        overflow: visible;
        filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
      }
      .preloader-group {
        transform-origin: 50px 50px;
        animation: preloaderGroupRotate 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .preloader-circle-left {
        fill: url(#leftHalfGrad);
        transform-origin: 50px 50px;
        animation: preloaderLeftHalfShift 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .preloader-circle-right {
        fill: url(#rightHalfGrad);
        transform-origin: 50px 50px;
        animation: preloaderRightHalfShift 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .preloader-text {

        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.25em;
        text-indent: 0.25em; /* Shift center by letter spacing */

        opacity: 0;
        transform: translateY(12px);
        animation: preloaderTextReveal 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
      }

      @keyframes preloaderLeftHalfShift {
        0% {
          opacity: 0;
          transform: scale(0.6) translate(0, 0);
        }
        25% {
          opacity: 1;
          transform: scale(1) translate(0, 0);
        }
        50%, 100% {
          transform: scale(1) translate(-4px, -14px);
        }
      }

      @keyframes preloaderRightHalfShift {
        0% {
          opacity: 0;
          transform: scale(0.6) translate(0, 0);
        }
        25% {
          opacity: 1;
          transform: scale(1) translate(0, 0);
        }

        }

        0%, 50% {
          transform: rotate(0deg);
        }

        }
      }

      @keyframes preloaderTextReveal {
        0%, 65% {
          opacity: 0;
          transform: translateY(15px);
        }
        82%, 100% {
          opacity: 1;
          transform: translateY(0);
        }
